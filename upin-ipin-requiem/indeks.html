<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upin & Ipin Requiem</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 class="rainbow-title">Upin & Ipin Requiem</h1>
  </header>

  <main>
    <!-- POSTER UPIN IPIN -->
    <section>
      <h2 class="rainbow-subtitle">Upin & Ipin Special Edition (9)</h2>
      <img src="poster.jpg" alt="Poster Upin Ipin" class="poster">
    </section>

    <!-- VIDEO TRAILER -->
    <section>
      <h2 class="rainbow-subtitle">Official Trailer</h2>
      <video controls poster="poster.jpg" class="video-player" loop>
        <source src="trailer.mp4" type="video/mp4">
        Video tidak support.
      </video>
    </section>

    <!-- AUDIO UPIN THEME -->
    <section>
      <h2 class="rainbow-subtitle">Theme Song</h2>
      <audio controls loop class="audio-player">
        <source src="upin-sound.mp3" type="audio/mpeg">
        Audio tidak support.
      </audio>
    </section>

    <!-- YOUTUBE UPIN IPIN - FIXED -->
    <section>
      <h2 class="rainbow-subtitle">Latest Episode</h2>
      <div class="youtube-container">
        <iframe src="https://www.youtube.com/embed/bJpSikhuMqA?si=8-Eh1dKcRu2AYzjE&start=13" 
                title="Upin Ipin Terbaru" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                referrerpolicy="strict-origin-when-cross-origin" 
                allowfullscreen>
        </iframe>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2024 Upin & Ipin Requiem | Fan Made</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
